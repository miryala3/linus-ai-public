name: Publish Release

# This workflow is triggered by the private linus-ai repo after a successful
# release build. The private repo holds PUBLIC_REPO_TOKEN and pushes binaries
# here directly — no secrets are needed in this public repo.
#
# workflow_dispatch is kept for manual re-runs by maintainers only.
on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version to re-publish (e.g. 2.2.1)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # This job exists only for manual re-runs triggered by maintainers.
  # Normal releases are pushed directly by the private repo's publish-public job.
  republish:
    name: Re-publish release (manual)
    runs-on: ubuntu-22.04
    steps:
      - name: Confirm trigger
        run: |
          echo "Manual re-publish triggered for v${{ inputs.version }}"
          echo "Normally releases are pushed by the private linus-ai CI."
          echo "No action taken — binaries must be uploaded from the private repo."
